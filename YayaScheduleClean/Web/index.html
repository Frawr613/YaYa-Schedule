<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>鸦鸦日程</title>
    <link rel="icon" type="image/png" href="icons/icon-transparent.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p id="todayMeta" class="micro"></p>
            <h1>鸦鸦日程</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="todayButton" type="button" class="icon-text">今日</button>
          <button id="settingsButton" type="button" class="icon-button" aria-label="设置">⚙</button>
        </div>
      </header>

      <section id="statusBar" class="status-bar" aria-live="polite"></section>
      <section id="ddlStrip" class="ddl-strip"></section>
      <section id="dayPanel" class="day-panel"></section>

      <section class="dashboard-grid">
        <article id="courseOverview" class="dashboard-panel"></article>
        <article id="examOverview" class="dashboard-panel"></article>
        <article id="scheduleOverview" class="dashboard-panel"></article>
        <article id="taskOverview" class="dashboard-panel"></article>
        <article id="specialOverview" class="dashboard-panel"></article>
      </section>
    </main>

    <input id="fileInput" type="file" accept=".xls,.html,.htm,.csv,.txt" hidden />
    <section id="modalRoot" class="modal-root" hidden></section>

    <script src="app-layers.js"></script>
    <script src="platform-bridge.js"></script>
    <script src="ui-modules.js"></script>
    <script src="theme-modules.js"></script>
    <script src="app.js"></script>
  </body>
</html>
